<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N3 2010年7月 クイズ</title>
<style>
:root {
  --bg:#f0f2f5; --card:#fff; --dark:#1a1a2e; --sumi:#252220;
  --gold:#d4a843; --green:#27ae60; --green-bg:#eafaf1;
  --red:#c0392b; --red-bg:#fdf0ef;
  --gray:#6b7280; --gray-light:#f4f5f7; --border:#e5e7eb;
  --indigo:#33495c; --vermilion:#bc4a3c;
  --shadow:0 2px 14px rgba(0,0,0,.09);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;background:var(--bg);color:var(--sumi);min-height:100vh;}

/* ===== HEADER ===== */
.hdr{background:var(--dark);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.25);}
.hdr-inner{max-width:780px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.hdr-title{font-family:"Noto Sans JP",sans-serif;font-size:.95rem;font-weight:700;color:#fff;letter-spacing:.04em;}
.hdr-title .lv{color:var(--gold);font-size:1.15rem;margin-right:4px;}
.hdr-pills{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:3px 11px;font-family:"Noto Sans JP",sans-serif;font-size:.72rem;color:rgba(255,255,255,.85);white-space:nowrap;}
.pill b{color:var(--gold);}
.prog-wrap{height:3px;background:rgba(255,255,255,.1);}
.prog-fill{height:3px;background:linear-gradient(90deg,var(--gold),#f5c842);transition:width .4s ease;width:0%;}

/* ===== COVER ===== */
#cover{max-width:780px;margin:28px auto 0;padding:0 16px 60px;}
.cover-card{background:linear-gradient(150deg,var(--dark) 0%,#233140 100%);border-radius:18px;padding:36px 32px;color:#f4ead0;position:relative;overflow:hidden;box-shadow:var(--shadow);}
.cover-card::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(244,234,208,.08) 1px,transparent 1px);background-size:18px 18px;}
.cover-stamp{position:absolute;top:20px;right:24px;width:64px;height:64px;border:2px solid var(--vermilion);border-radius:9px;color:var(--vermilion);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;transform:rotate(-5deg);background:rgba(188,74,60,.08);font-family:"Noto Sans JP",sans-serif;}
.cover-kicker{font-family:"Noto Sans JP",sans-serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;position:relative;}
.cover-h1{font-size:1.6rem;font-weight:700;line-height:1.4;margin-bottom:6px;position:relative;}
.cover-h1 .acc{color:#e8b96a;}
.cover-sub{font-family:"Noto Sans JP",sans-serif;font-size:.82rem;color:#c5d4de;margin-bottom:22px;line-height:1.7;position:relative;}
.cover-meta{display:flex;gap:16px;flex-wrap:wrap;font-family:"Noto Sans JP",sans-serif;font-size:.75rem;color:#9ab0c0;border-top:1px solid rgba(244,234,208,.15);padding-top:14px;position:relative;}
.cover-meta b{color:#f4ead0;}
.start-btn{position:relative;margin-top:20px;display:inline-flex;align-items:center;gap:8px;background:var(--vermilion);color:#fff7ec;border:none;font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:.9rem;padding:13px 26px;border-radius:999px;cursor:pointer;box-shadow:0 6px 18px rgba(188,74,60,.35);transition:transform .15s,box-shadow .15s;}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(188,74,60,.45);}

/* ===== QUIZ AREA ===== */
#quizArea{max-width:780px;margin:0 auto;padding:0 16px 80px;display:none;}

/* Jump panel */
.jump-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:14px;}
.jump-label{font-family:"Noto Sans JP",sans-serif;font-size:.7rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.jump-sections{}
.jump-sec-title{font-family:"Noto Sans JP",sans-serif;font-size:.68rem;color:var(--gray);margin:8px 0 5px;font-weight:700;}
.jump-sec-title:first-child{margin-top:0;}
.jump-nums{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.jbtn{width:32px;height:32px;border-radius:7px;border:1.5px solid var(--border);background:var(--card);font-family:"Noto Sans JP",sans-serif;font-size:.75rem;color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;transition:all .15s;}
.jbtn:hover{border-color:var(--dark);color:var(--dark);}
.jbtn.cur{border-color:var(--indigo);background:var(--indigo);color:#fff;}
.jbtn.ok{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.jbtn.ng{background:var(--red-bg);border-color:var(--vermilion);color:var(--vermilion);}

/* Progress */
.prog-info{display:flex;justify-content:space-between;align-items:center;font-family:"Noto Sans JP",sans-serif;font-size:.75rem;color:var(--gray);margin:14px 0 6px;padding:0 2px;}
.prog-info .sect-lbl{font-weight:700;color:var(--vermilion);}

/* Card */
.qcard{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;animation:rise .3s ease;}
@keyframes rise{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}

.sect-desc{font-family:"Noto Sans JP",sans-serif;font-size:.75rem;color:var(--gray);background:var(--gray-light);border-left:3px solid var(--gold);padding:9px 14px;line-height:1.65;}

/* Translation box */
.tl-box{font-family:"Noto Sans JP",sans-serif;font-size:.78rem;color:#2a5c3a;background:#eef6f0;border:1px solid #b0d4bc;border-left:3px solid var(--green);padding:9px 14px;line-height:1.65;}
.tl-lbl{font-weight:700;color:var(--green);margin-right:4px;}

.q-header{display:flex;align-items:flex-start;gap:13px;padding:20px 22px 16px;}
.q-num{background:var(--sumi);color:#f4ead0;font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:.82rem;min-width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.q-text{font-size:1.05rem;line-height:1.95;flex:1;}
.q-text u{text-decoration-color:var(--vermilion);text-decoration-thickness:2px;text-underline-offset:3px;color:var(--vermilion);font-weight:700;}

.passage{background:var(--gray-light);border:1px solid var(--border);border-radius:9px;padding:15px 17px;margin:0 20px 16px;font-size:.92rem;line-height:2;max-height:340px;overflow-y:auto;}
.passage h4{font-size:.88rem;color:var(--vermilion);margin-bottom:8px;}
.passage p{margin-bottom:10px;}
.passage p:last-child{margin-bottom:0;}
.passage .note{font-size:.75rem;color:var(--gray);font-family:"Noto Sans JP",sans-serif;}
.passage .blank{display:inline-block;border-bottom:2px solid var(--sumi);min-width:80px;text-align:center;font-weight:700;color:var(--indigo);}

/* Options — vertical, numbered */
.opts{display:flex;flex-direction:column;gap:9px;padding:4px 20px 20px;}
.opt{display:flex;align-items:flex-start;gap:11px;border:1.5px solid var(--border);border-radius:11px;padding:12px 15px;cursor:pointer;background:#fffefb;transition:border-color .15s,background .15s;font-size:.95rem;line-height:1.65;text-align:left;font-family:inherit;color:var(--sumi);width:100%;}
.opt:hover:not([disabled]){border-color:var(--gold);background:#fffaf0;}
.opt-badge{flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--gray);display:flex;align-items:center;justify-content:center;font-family:"Noto Sans JP",sans-serif;font-size:.78rem;font-weight:700;color:var(--gray);margin-top:1px;transition:all .15s;}
.opt.sel{border-color:var(--indigo);background:#eef3f6;}
.opt.sel .opt-badge{background:var(--indigo);border-color:var(--indigo);color:#fff;}
.opt.correct{border-color:var(--green);background:var(--green-bg);}
.opt.correct .opt-badge{background:var(--green);border-color:var(--green);color:#fff;}
.opt.wrong{border-color:var(--vermilion);background:var(--red-bg);}
.opt.wrong .opt-badge{background:var(--vermilion);border-color:var(--vermilion);color:#fff;}
.opt[disabled]{cursor:default;}

/* Feedback */
.feedback{margin:0 20px 20px;padding:13px 16px;border-radius:10px;font-family:"Noto Sans JP",sans-serif;font-size:.82rem;line-height:1.8;display:none;}
.feedback.show{display:block;animation:rise .2s ease;}
.feedback.ok{background:var(--green-bg);border:1px solid var(--green);color:#1a4a30;}
.feedback.ng{background:var(--red-bg);border:1px solid var(--vermilion);color:#6e2a21;}
.fb-tag{font-weight:700;margin-right:5px;}

/* Navbar */
.navbar{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:12px;font-family:"Noto Sans JP",sans-serif;}
.nav-btn{border:1.5px solid var(--sumi);background:transparent;color:var(--sumi);padding:10px 20px;border-radius:999px;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;}
.nav-btn:hover:not([disabled]){background:var(--sumi);color:#fff;}
.nav-btn[disabled]{opacity:.3;cursor:not-allowed;}
.nav-btn.primary{background:var(--vermilion);border-color:var(--vermilion);color:#fff;}
.nav-btn.primary:hover{background:var(--vermilion-deep,#9c3a2f);}

/* Result */
#resultArea{max-width:780px;margin:28px auto;padding:0 16px 80px;display:none;}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px 28px;text-align:center;box-shadow:var(--shadow);}
.ring-wrap{width:150px;height:150px;margin:8px auto 18px;position:relative;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.ring-pct b{font-size:28px;line-height:1;}
.ring-pct span{font-family:"Noto Sans JP",sans-serif;font-size:.68rem;color:var(--gray);margin-top:3px;}
.result-card h2{margin:0 0 4px;font-size:1.3rem;}
.result-comment{font-family:"Noto Sans JP",sans-serif;font-size:.82rem;color:var(--gray);margin-bottom:22px;}
.breakdown{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:18px 0 22px;font-family:"Noto Sans JP",sans-serif;}
.bd-item{border:1px solid var(--border);border-radius:10px;padding:10px 12px;text-align:left;font-size:.72rem;}
.bd-item .lbl{color:var(--gray);margin-bottom:3px;}
.bd-item .val{font-size:.95rem;font-weight:700;}
.bd-item .val.ok{color:var(--green);}
.bd-item .val.ng{color:var(--vermilion);}
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.review-list{text-align:left;margin-top:24px;}
.rev-item{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:9px;}
.rev-q{font-size:.88rem;margin-bottom:5px;}
.rev-a{font-family:"Noto Sans JP",sans-serif;font-size:.75rem;}
.rev-a.ok{color:var(--green);}
.rev-a.ng{color:var(--vermilion);}

/* tl+kw di dalam feedback */
.fb-tl-wrap{background:rgba(255,255,255,.45);border-radius:7px;padding:8px 11px;margin:6px 0 8px;border:1px solid rgba(0,0,0,.07);}
.fb-tl{font-size:.8rem;line-height:1.7;font-family:"Noto Sans JP",sans-serif;}
.fb-tl+.fb-tl{margin-top:2px;}

.hidden{display:none!important;}
@media(max-width:480px){.cover-h1{font-size:1.25rem;}.q-text{font-size:.97rem;}.opt{font-size:.88rem;}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-title"><span class="lv">N3</span> 2010年7月 新日本語能力試験</div>
    <div class="hdr-pills">
      <div class="pill">問 <b id="hProg">–</b></div>
      <div class="pill">✓ <b id="hScore">0</b></div>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<!-- COVER -->
<div id="cover">
  <div class="cover-card">
    <div class="cover-stamp">N3</div>
    <div class="cover-kicker">Interactive Mock Exam · Kuis Interaktif</div>
    <h1 class="cover-h1">新日本語能力試験<br><span class="acc">N3 模擬問題</span> — 2010年7月</h1>
    <p class="cover-sub">文字・語彙（問題1〜5）＋ 語法（問題1〜3）＋ 読解（問題4〜7）の全39問。<br>
    各問に🇮🇩 terjemahan & 📖 cara baca kanji. Bisa loncat ke soal mana saja!</p>
    <div class="cover-meta">
      <div><b>39問</b> 全問</div>
      <div><b>文字・語彙・語法・読解</b></div>
      <div>Terjemahan <b>Indonesia</b></div>
    </div>
    <button class="start-btn" onclick="startQuiz()">▶ はじめる / Mulai</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quizArea">
  <!-- Jump panel -->
  <div class="jump-panel" id="jumpPanel">
    <div class="jump-label">📍 Loncat ke soal</div>
    <div id="jumpSections"></div>
  </div>

  <div class="prog-info">
    <span class="sect-lbl" id="sectLbl">—</span>
    <span id="progLbl">0 / 39</span>
  </div>

  <div class="qcard" id="qCard">
    <div class="sect-desc" id="sectDesc"></div>
    <div class="tl-box" id="tlBox"></div>
    <div class="q-header">
      <div class="q-num" id="qNum">1</div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="passage hidden" id="passageBox"></div>
    <div class="opts" id="optList"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="navbar">
    <button class="nav-btn" id="prevBtn" onclick="go(-1)" disabled>← 前へ</button>
    <button class="nav-btn primary" id="nextBtn" onclick="go(1)" disabled>次へ →</button>
  </div>
</div>

<!-- RESULT -->
<div id="resultArea">
  <div class="result-card">
    <div class="ring-wrap">
      <svg width="150" height="150" viewBox="0 0 150 150">
        <circle cx="75" cy="75" r="62" fill="none" stroke="#efe7d6" stroke-width="12"/>
        <circle id="ringFg" cx="75" cy="75" r="62" fill="none" stroke="#bc4a3c" stroke-width="12" stroke-linecap="round" stroke-dasharray="390" stroke-dashoffset="390"/>
      </svg>
      <div class="ring-pct"><b id="rPct">0%</b><span id="rFrac">0/39</span></div>
    </div>
    <h2 id="rTitle">お疲れ様でした</h2>
    <p class="result-comment" id="rComment"></p>
    <div class="breakdown" id="breakdown"></div>
    <div class="result-actions">
      <button class="nav-btn primary" onclick="showReview()">📖 全問解説</button>
      <button class="nav-btn" onclick="restart()">↻ もう一度</button>
    </div>
    <div class="review-list hidden" id="reviewList"></div>
  </div>
</div>

<script>
/* ===================== DATA SOAL ===================== */
const SECTIONS = [
/* ──────────────── 文字・語彙 ──────────────── */
{
  id:"m1", title:"問題１", groupLabel:"文字・語彙",
  desc:"＿＿のことばの読み方として最もよいものを１・２・３・４から一つえらびなさい。\n[Pilih cara baca yang paling tepat untuk kata bergaris bawah]",
  questions:[
    { n:1, q:"プレゼントはきれいな紙で<u>包ん</u>であった。",
      tl:"Hadiah itu dibungkus dengan kertas yang indah.",
      kw:"包む（つつむ）= membungkus",
      opts:["つつんで","つづんで","つうつんで","つうづんで"], ans:0,
      exp:"✅ 包む（つつむ）= membungkus. Ingat: つ・つ・む, tidak ada pemanjangan vokal. 選択肢2〜4は存在しない読み方。" },
    { n:2, q:"彼はダンスが<u>得意</u>だ。",
      tl:"Dia jago menari.",
      kw:"得意（とくい）= jago, pandai",
      opts:["どおくい","とおくい","どくい","とくい"], ans:3,
      exp:"✅ 得意（とくい）= jago/ahli dalam sesuatu. 得(とく)・意(い)。「とお」や「ど」は誤読。" },
    { n:3, q:"新しい星が<u>発見</u>された。",
      tl:"Bintang baru telah ditemukan.",
      kw:"発見（はっけん）= penemuan",
      opts:["はっけん","はけん","はつけん","ばっけん"], ans:0,
      exp:"✅ 発見（はっけん）= menemukan/penemuan. 発 → はっ (促音化). はけん=派遣(berbeda), はつけん/ばっけん=tidak ada." },
    { n:4, q:"このグラフは人口の変化を<u>表して</u>います。",
      tl:"Grafik ini menunjukkan perubahan jumlah penduduk.",
      kw:"表す（あらわす）= menunjukkan, menyatakan",
      opts:["しめして","ふやして","うごかして","あらわして"], ans:3,
      exp:"✅ 表す（あらわす）= menunjukkan/menyatakan. ❌ 示す(しめす)=menunjukkan secara langsung, 増やす(ふやす)=menambah, 動かす(うごかす)=menggerakkan." },
    { n:5, q:"山田さんから、来週の会議の<u>件</u>で電話がありました。",
      tl:"Ada telepon dari Yamada-san mengenai urusan rapat minggu depan.",
      kw:"件（けん）= hal, perkara, urusan",
      opts:["けん","あん","ほう","よう"], ans:0,
      exp:"✅ 件（けん）= hal/urusan/perkara. ❌ 案(あん)=rencana/usulan, 方(ほう)=arah, 要(よう)=keperluan." },
    { n:6, q:"<u>通勤</u>にとても時間がかかります。",
      tl:"Perjalanan pulang-pergi kerja membutuhkan banyak waktu.",
      kw:"通勤（つうきん）= pergi-pulang kerja, commuting",
      opts:["つうがく","つうきん","つうやく","つうしん"], ans:1,
      exp:"✅ 通勤（つうきん）= commuting/pergi kerja. ❌ 通学(つうがく)=sekolah, 通訳(つうやく)=penerjemah, 通信(つうしん)=komunikasi." },
    { n:7, q:"この海岸は<u>岩</u>が多い。",
      tl:"Pantai ini banyak bebatuan.",
      kw:"岩（いわ）= batu karang, bebatuan besar",
      opts:["かい","いわ","すな","なみ"], ans:1,
      exp:"✅ 岩（いわ）= batu karang/bebatuan. ❌ 砂(すな)=pasir, 波(なみ)=ombak, かい=貝(kerang)." },
    { n:8, q:"<u>努力</u>することは大切だと思います。",
      tl:"Saya pikir berusaha keras itu hal yang penting.",
      kw:"努力（どりょく）= usaha keras, kerja keras",
      opts:["どうりょく","とうりょく","どりょく","とりょく"], ans:2,
      exp:"✅ 努力（どりょく）= kerja keras/berusaha. Perhatikan: ど・りょく (bukan どう). ❌ 動力(どうりょく)=daya penggerak (kata berbeda)." }
  ]
},
{
  id:"m2", title:"問題２", groupLabel:"文字・語彙",
  desc:"＿＿のことばを漢字で書くとき最もよいものを１・２・３・４から一つえらびなさい。\n[Pilih kanji yang tepat untuk kata bergaris bawah]",
  questions:[
    { n:9, q:"機械が<u>せいじょう</u>かどうかチェックした。",
      tl:"Dicek apakah mesin berfungsi dengan normal.",
      kw:"正常（せいじょう）= normal, wajar",
      opts:["盛情","威常","正情","正常"], ans:3,
      exp:"✅ 正常（せいじょう）= normal/berfungsi sebagaimana mestinya. 正(せい)=benar, 常(じょう)=biasa/normal." },
    { n:10, q:"健康診断で<u>けつえき</u>検査を受けた。",
      tl:"Saya menjalani tes darah saat pemeriksaan kesehatan.",
      kw:"血液（けつえき）= darah",
      opts:["意識","圏圧","血液","血圧"], ans:2,
      exp:"✅ 血液（けつえき）= darah. 血(けつ)=darah, 液(えき)=cairan. ❌ 血圧(けつあつ)=tekanan darah (beda!)." },
    { n:11, q:"母親が子どもの後ろを<u>おって</u>走っている。",
      tl:"Ibu berlari mengejar di belakang anaknya.",
      kw:"追う（おう）= mengejar",
      opts:["送って","追って","押って","折って"], ans:1,
      exp:"✅ 追う（おう）= mengejar. ❌ 送る(おくる)=mengirim, 押す(おす)=mendorong, 折る(おる)=melipat." },
    { n:12, q:"電車を<u>おりる</u>ときに、かさを忘れてしまった。",
      tl:"Ketika turun dari kereta, saya lupa payung.",
      kw:"降りる（おりる）= turun (dari kendaraan)",
      opts:["移りる","移る","降りる","降る"], ans:2,
      exp:"✅ 降りる（おりる）= turun dari kendaraan. ❌ 移る(うつる)=berpindah/menular. 降る(ふる)=turun (hujan)—beda kata!" },

{
  id:"g3", title:"問題３", groupLabel:"語法（文法）",
  desc:"次の文章を読んで、19から23の中に入る最もよいものを、１・２・３・４から一つ選びなさい。\n[Baca teks, lalu pilih yang tepat untuk mengisi bagian 19〜23]",
  passage:`<h4>しゃべる自動販売機</h4>
<p>みなさんは、自動販売機がしゃべったと聞いたら、信じられますか。ほとんどの人は、自動販売機がしゃべるはずはないと言って、笑うでしょう。<span class="blank">19-a</span>、しゃべる自動販売機は本当に<span class="blank">19-b</span>。</p>
<p>わたしの家の近所には一台の自動販売機があります。ふつうの飲み物の自動販売機に見えますが、<span class="blank">20</span>自動販売機は話すことができます。例えば、朝、自動販売機の隣に立つと、「おはようございます」と話しかけてきたり、買った後には、「いってらっしゃい」と言ってくれたりします。それから、夜、飲み物を買った人に、「お疲れさまでした。」と<span class="blank">21</span>のを見たことがあります。</p>
<p>最初はとてもびっくりしました。機械がしゃべるのは、アニメや映画の中だけだと思っていたからです。わたしがよく見るアニメの中では、機械も人間と同じようにしゃべったり歩いたりしています。<span class="blank">22</span>、自動販売機に話しかけられるなんて、まるでアニメの世界にいるようだと思いました。</p>
<p>今は、自動販売機が「いってらっしゃい」と話しかけてくるのにも慣れて、心で「いってきます」と答えています。もしいつか、歩く自動販売機ができても、今はもう<span class="blank">23</span>かもしれません。</p>`,

    { n:23, q:"【23】に入るもの",

      kw:"おどろかない = tidak akan terkejut",
      opts:["信じない","言い返さない","しゃべらない","おどろかない"], ans:3,
      exp:"✅ おどろかない = tidak akan terkejut. Konteks: sudah terbiasa dengan mesin yang bicara → 歩く自動販売機が出てきても、もうおどろかない. ❌ 信じない=tidak percaya (makna berbeda)." }

  questions:[
    { n:28,
      passage:`<p>（１）最近、近所の花屋が閉店した。30年以上も「町の花屋さん」として愛着されてきた店だ。</p>
<p>この店がオープンしたのは、わたしがまだ小学校に入る前だった。わたしにとって、①<u>店の思い出はそのまま子どものころの思い出と重なる</u>。家族の誕生日や家にお客さんが来る時などには、母と一緒にこの店で花を買っていた。</p>
<p>小学校を卒業する時には、こんなことがあった。クラス全員でお金を出し合い、担任の先生に花束をおくることになった。「お礼の気持ちを表すために、見たことのないほど大きいのをおくろう」とわたしたちは話し合った。しかし、小学生のおこづかいの中集まったお金は少しだけだった。それで、②<u>わたしたちはどきどきしながら</u>、「大好きな先生にあげるから、できるだけ大きい花束を作ってください」とお願いした。おじさんは嫌な顔もしないで、特別大きなバラの花束を作ってくれた。</p>
<p>30年以上もきれいな花束を作り続け、あたたかい思い出を作ってくれたおじさんに、「ありがとう、お疲れ様でした。」と言いたい。</p>`,

    { n:29, q:"②『わたしたちはどきどきしながら』とあるが、どうしてどきどきしたのか。",

    { n:30, q:"この文章を書いた人が一番伝えたいことは何か。",

      exp:"✅ 2番: 「30年以上きれいな花束を作り続けてくれたおじさんに『ありがとう、お疲れ様でした』と言いたい」= ucapan terima kasih kepada pemilik toko bunga." },
    { n:31,
      passage:`<p>（２）環境問題では「リサイクル」という言葉をよく聞く。リサイクルとは、いらない物を壊して、別の物に作り変えることだ。例えば、読み終わった新聞紙からトイレットペーパーを作ったりする。物を捨てればゴミになるが、リサイクルすればゴミを出さないことができる。だが、リサイクルが形を変えるのにお金がかかるし、エネルギーも使う。</p>
<p>また、「再使用」という方法もある。再使用というのは、ものを壊さないで、何度も使うことを言う。例えば、飲んだ後のペットボトルを洗ってまた使う。それで、再使用するペットボトルは何回も使えるように、少し厚くしっかりと作られている。ドイツでは一本のペットボトルをだいたい15〜30回くらい使うそうだ。</p>
<p>以前は、お金やエネルギーの点で、リサイクルより再使用の方がいいと考えられていた。しかし、実際に調べてみると、場合によっては再使用の方がお金やエネルギーを使うことがわかってきた。それで、最近はどちらの方が環境にいいとは単純には言えなくなっている。</p>`,
      q:"この文章では、リサイクルとはどのようなことだと言っているか。",
      tl:"Menurut teks ini, apa yang dimaksud dengan daur ulang (recycle)?",
      kw:"リサイクル = いらない物を壊して別の物に作り変えること",
      opts:["いらなくなった物から新しい物を作ること","いらなくなった物を壊して捨てること","物を壊さないで、ゴミの量を減らすこと","物を捨てないで、そのままもう一度使うこと"], ans:0,
      exp:"✅ 1番: 「いらない物を壊して、別の物に作り変える」= mengubah sampah menjadi produk baru. ❌ 4番は「再使用」の定義." },

  passage:`<p>最近、長い間働いた会社をやめて、日本そば屋を始める人が増えているそうだ。今年の4月、奥さんと二人で中村駅前に小さな店を開いた「そば屋　しんしゅう」のご主人、①<u>森さんもその一人だ</u>。「収入は減ったけど、今はやってよかったと思っています」と、森さんは言う。</p>

/* ──── flatten all questions ──── */
const ALL = [];
SECTIONS.forEach(s => {
  s.questions.forEach(q => {
    ALL.push({ ...q, _sid: s.id, _stitle: s.title, _sgroup: s.groupLabel, _sdesc: s.desc, _spass: s.passage || null });
  });
});
const TOTAL = ALL.length;
let cur = 0;
const answers = new Array(TOTAL).fill(null);

/* ──── nav groups for jumpbar ──── */
const JUMP_GROUPS = [];
let gi = -1, curGroup = null;
SECTIONS.forEach(s => {
  if (!curGroup || curGroup.label !== s.groupLabel) {
    curGroup = { label: s.groupLabel, sections: [] };
    JUMP_GROUPS.push(curGroup);
  }
  curGroup.sections.push({ title: s.title, qIndices: s.questions.map(q => ALL.findIndex(a => a.n === q.n && a._sid === s.id)) });
});

function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  buildJump();
  renderQ();
}

function buildJump() {
  const container = document.getElementById('jumpSections');
  container.innerHTML = '';
  JUMP_GROUPS.forEach(g => {
    const gl = document.createElement('div');
    gl.className = 'jump-sec-title';
    gl.textContent = g.label;
    container.appendChild(gl);
    const row = document.createElement('div');
    row.className = 'jump-nums';
    g.sections.forEach(sec => {
      sec.qIndices.forEach(idx => {
        if (idx < 0) return;
        const q = ALL[idx];
        const b = document.createElement('button');
        b.className = 'jbtn';
        b.id = 'jb' + idx;
        b.textContent = q.n;
        b.title = q._stitle;
        b.onclick = () => { cur = idx; renderQ(); };
        row.appendChild(b);
      });
    });
    container.appendChild(row);
  });
}

function updateJump() {
  ALL.forEach((_, i) => {
    const b = document.getElementById('jb' + i);
    if (!b) return;
    b.className = 'jbtn';
    if (i === cur) b.classList.add('cur');
    else if (answers[i] !== null) b.classList.add(answers[i] === ALL[i].ans ? 'ok' : 'ng');
  });
}

function renderQ() {
  const q = ALL[cur];
  document.getElementById('sectLbl').textContent = q._sgroup + ' — ' + q._stitle;
  document.getElementById('progLbl').textContent = (cur + 1) + ' / ' + TOTAL;
  document.getElementById('progFill').style.width = ((cur + 1) / TOTAL * 100) + '%';
  document.getElementById('hProg').textContent = (cur + 1) + '/' + TOTAL;
  document.getElementById('sectDesc').textContent = q._sdesc;
  document.getElementById('qNum').textContent = q.n;
  document.getElementById('qText').innerHTML = q.q.replace(/\n/g, '<br>');

  // translation — sembunyikan, muncul setelah menjawab
  const tlBox = document.getElementById('tlBox');
  tlBox.innerHTML = '';
  tlBox.style.display = 'none';

  // passage
  const pb = document.getElementById('passageBox');
  const pass = q.passage || q._spass;
  if (pass) { pb.innerHTML = pass; pb.classList.remove('hidden'); }
  else { pb.innerHTML = ''; pb.classList.add('hidden'); }

  // options — vertical, 1234 numbered
  const ol = document.getElementById('optList');
  ol.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    if (answers[cur] !== null) btn.disabled = true;
    if (answers[cur] === i) btn.classList.add(i === q.ans ? 'correct' : 'wrong');
    else if (answers[cur] !== null && i === q.ans) btn.classList.add('correct');
    btn.innerHTML = `<span class="opt-badge">${i + 1}</span><span>${o}</span>`;
    btn.onclick = () => { if (answers[cur] === null) pick(i); };
    ol.appendChild(btn);
  });

  // feedback — tl + kw + exp muncul bersamaan setelah menjawab
  const fb = document.getElementById('feedback');
  if (answers[cur] !== null) {
    const ok = answers[cur] === q.ans;
    fb.className = 'feedback show ' + (ok ? 'ok' : 'ng');
    let tlPart = '';
    if (q.tl) tlPart += `<div class="fb-tl"><span class="tl-lbl">🇮🇩</span>${q.tl}</div>`;
    if (q.kw) tlPart += `<div class="fb-tl"><span class="tl-lbl">📖</span>${q.kw}</div>`;
    if (tlPart) tlPart = `<div class="fb-tl-wrap">${tlPart}</div>`;
    fb.innerHTML = `<span class="fb-tag">${ok ? '✅ 正解！' : '❌ 不正解'}</span>${tlPart}${q.exp}`;
  } else {
    fb.className = 'feedback';
    fb.innerHTML = '';
  }

  document.getElementById('prevBtn').disabled = cur === 0;
  const nb = document.getElementById('nextBtn');
  nb.disabled = answers[cur] === null;
  nb.textContent = cur === TOTAL - 1 ? '結果を見る →' : '次へ →';

  updateJump();
  document.getElementById('qCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function pick(i) {
  answers[cur] = i;
  document.getElementById('hScore').textContent = answers.filter((a, j) => a !== null && a === ALL[j].ans).length;
  renderQ();
}

function go(dir) {
  if (dir === 1 && cur === TOTAL - 1) { showResult(); return; }
  cur = Math.max(0, Math.min(TOTAL - 1, cur + dir));
  renderQ();
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('resultArea').style.display = 'block';
  const correct = answers.filter((a, i) => a === ALL[i].ans).length;
  const pct = Math.round(correct / TOTAL * 100);
  document.getElementById('rPct').textContent = pct + '%';
  document.getElementById('rFrac').textContent = correct + '/' + TOTAL;
  const circ = 2 * Math.PI * 62;
  document.getElementById('ringFg').style.strokeDashoffset = circ * (1 - pct / 100);
  let title = 'お疲れ様でした！', comment = '';
  if (pct >= 80) { title = '素晴らしい！🎉'; comment = 'N3レベル、ほぼ完璧！合格間違いなし！ / Hampir sempurna, lulus N3!'; }
  else if (pct >= 60) { title = 'よくできました！'; comment = '合格ラインに近い！あと少し！/ Mendekati batas lulus!'; }
  else if (pct >= 40) { title = 'もう少し！'; comment = '復習を続けよう！/ Terus berlatih!'; }
  else { title = '頑張ろう！'; comment = 'もう一度挑戦！/ Coba lagi ya!'; }
  document.getElementById('rTitle').textContent = title;
  document.getElementById('rComment').textContent = comment;

  const bd = document.getElementById('breakdown');
  bd.innerHTML = '';
  SECTIONS.forEach(s => {
    const idxs = s.questions.map(q => ALL.findIndex(a => a.n === q.n && a._sid === s.id));
    const sc = idxs.filter(i => i >= 0 && answers[i] === ALL[i].ans).length;
    const d = document.createElement('div'); d.className = 'bd-item';
    d.innerHTML = `<div class="lbl">${s.groupLabel} ${s.title}</div><div class="val ${sc === s.questions.length ? 'ok' : sc === 0 ? 'ng' : ''}">${sc}/${s.questions.length}</div>`;
    bd.appendChild(d);
  });
}

function showReview() {
  const rl = document.getElementById('reviewList');
  rl.innerHTML = '';
  rl.classList.remove('hidden');
  ALL.forEach((q, i) => {
    const ok = answers[i] === q.ans;
    const d = document.createElement('div'); d.className = 'rev-item';
    let tlPart = '';
    if (q.tl) tlPart += `<div class="fb-tl"><span class="tl-lbl">🇮🇩</span>${q.tl}</div>`;
    if (q.kw) tlPart += `<div class="fb-tl"><span class="tl-lbl">📖</span>${q.kw}</div>`;
    if (tlPart) tlPart = `<div class="fb-tl-wrap" style="margin-bottom:4px;">${tlPart}</div>`;
    d.innerHTML = `<div class="rev-q"><b>${q.n}.</b> ${q.q.replace(/\n/g,'<br>')}</div>
      <div class="rev-a ${ok ? 'ok' : 'ng'}">${ok ? '✅ 正解' : '❌ 不正解'} — あなた: ${answers[i] !== null ? q.opts[answers[i]] : '未回答'} / 正解: ${q.opts[q.ans]}</div>
      <div class="rev-a" style="margin-top:6px;color:#555;">${tlPart}${q.exp}</div>`;
    rl.appendChild(d);
  });
}

function restart() {
  answers.fill(null);
  cur = 0;
  document.getElementById('hScore').textContent = '0';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('reviewList').classList.add('hidden');
  document.getElementById('quizArea').style.display = 'block';
  buildJump();
  renderQ();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
